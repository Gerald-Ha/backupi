# backupi public example configuration
#
# This config is safe to publish because it contains no personal mount paths,
# usernames or machine-specific backup destination.
#
# IMPORTANT:
# BACKUP_ROOT is intentionally empty. backupi refuses to run backups until the
# user sets a real absolute backup destination with:
#
#   backupi --set-backup-root "/path/to/backup"
#
# Format for BACKUPI_ITEMS:
# kind|id|category|group|source|backup_path|restore_target|description|snapshot_policy
#
# kind:
#   file, dir, dnf-packages, flatpak-apps
#
# category:
#   safe   - usually fine to restore, still review before overwriting /etc
#   risky  - restore only as a deliberate single choice
#
# snapshot_policy:
#   snapshot      - included in historical snapshots with rsync --link-dest
#   current-only  - only kept in the latest current backup, useful for large
#                   changing data and noisy app state
#
# Excludes:
#   BACKUPI_EXCLUDES applies to every rsync directory/file backup.
#   BACKUPI_ITEM_EXCLUDES applies only to the item id before the pipe.
#   Patterns use rsync exclude syntax and are relative to each item source.

BACKUP_ROOT="${BACKUP_ROOT:-}"

# Backups are written to:
# $BACKUP_ROOT/current
#
# Historical restore points are written to:
# $BACKUP_ROOT/snapshots/<timestamp>
BACKUP_USE_CURRENT_DIR="${BACKUP_USE_CURRENT_DIR:-true}"
BACKUP_CURRENT_DIRNAME="${BACKUP_CURRENT_DIRNAME:-current}"
BACKUP_SNAPSHOTS_ENABLED="${BACKUP_SNAPSHOTS_ENABLED:-true}"
BACKUP_SNAPSHOT_DIRNAME="${BACKUP_SNAPSHOT_DIRNAME:-snapshots}"
BACKUP_SNAPSHOT_RETENTION="${BACKUP_SNAPSHOT_RETENTION:-5}"

# backupi always stores the active config here on every backup run.
# It is included in snapshots, so config changes can be restored later.
BACKUPI_SELF_CONFIG_BACKUP_PATH="${BACKUPI_SELF_CONFIG_BACKUP_PATH:-backupi/backupi.conf}"

# true makes directory backups mirror the live system more closely.
BACKUP_RSYNC_DELETE="${BACKUP_RSYNC_DELETE:-true}"

# true removes files from the backup target when they match an exclude pattern.
# This helps clean up already-backed-up large folders after adding excludes.
BACKUP_RSYNC_DELETE_EXCLUDED="${BACKUP_RSYNC_DELETE_EXCLUDED:-true}"

# Before restore, copy the current target into:
# $BACKUP_ROOT/pre-restore-snapshots/<timestamp>/
BACKUP_BEFORE_RESTORE="${BACKUP_BEFORE_RESTORE:-true}"

BACKUPI_EXCLUDES=(
  ".cache/"
  "Cache/"
  "cache/"
  "CachedData/"
  "Code Cache/"
  "GPUCache/"
  "ShaderCache/"
  "logs/"
  "*.log"
  "Trash/"
  "node_modules/"
  "__pycache__/"
  ".DS_Store"
)

BACKUPI_ITEM_EXCLUDES=(
  "flatpak-user-data|com.valvesoftware.Steam/.local/share/Steam/steamapps/common/"
  "flatpak-user-data|com.valvesoftware.Steam/.local/share/Steam/steamapps/shadercache/"
  "flatpak-user-data|com.valvesoftware.Steam/.local/share/Steam/steamapps/compatdata/"
  "flatpak-user-data|com.valvesoftware.Steam/.local/share/Steam/steamapps/downloading/"
  "flatpak-user-data|com.valvesoftware.Steam/.local/share/Steam/steamapps/temp/"
  "steam|steamapps/common/"
  "steam|steamapps/shadercache/"
  "steam|steamapps/compatdata/"
  "steam|steamapps/downloading/"
  "steam|steamapps/temp/"
  "lutris|runners/"
  "lutris|runtime/"
)

