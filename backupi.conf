  "dir|modprobe|safe|linux-system|/etc/modprobe.d|etc/modprobe.d|/etc/modprobe.d|Kernel module options and blacklists|snapshot"
  "dir|sysctl-dir|safe|linux-system|/etc/sysctl.d|etc/sysctl.d|/etc/sysctl.d|Kernel sysctl drop-ins|snapshot"
