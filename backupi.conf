  "file|crypttab|risky|boot-mount-display|/etc/crypttab|etc/crypttab|/etc/crypttab|Encrypted volume table|snapshot"
  "file|grub-default|risky|boot-mount-display|/etc/default/grub|etc/default/grub|/etc/default/grub|GRUB default configuration|snapshot"
