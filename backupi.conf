  "file|kglobalshortcutsrc|risky|kde-careful|${HOME}/.config/kglobalshortcutsrc|home-config/.config/kglobalshortcutsrc|${HOME}/.config/kglobalshortcutsrc|KDE global shortcuts|snapshot"
  "file|kwinrc|risky|kde-plasma-risk|${HOME}/.config/kwinrc|home-config/.config/kwinrc|${HOME}/.config/kwinrc|KWin settings|snapshot"
  "file|kwinoutputconfig|risky|kde-plasma-risk|${HOME}/.config/kwinoutputconfig.json|home-config/.config/kwinoutputconfig.json|${HOME}/.config/kwinoutputconfig.json|KWin monitor output layout|snapshot"
  "file|plasma-applets|risky|kde-plasma-risk|${HOME}/.config/plasma-org.kde.plasma.desktop-appletsrc|home-config/.config/plasma-org.kde.plasma.desktop-appletsrc|${HOME}/.config/plasma-org.kde.plasma.desktop-appletsrc|Plasma panel and widget layout|snapshot"
  "file|plasmashellrc|risky|kde-plasma-risk|${HOME}/.config/plasmashellrc|home-config/.config/plasmashellrc|${HOME}/.config/plasmashellrc|Plasma shell settings|snapshot"
  "file|kscreenlockerrc|risky|kde-plasma-risk|${HOME}/.config/kscreenlockerrc|home-config/.config/kscreenlockerrc|${HOME}/.config/kscreenlockerrc|KDE screen locker settings|snapshot"
  "file|kxkbrc|risky|kde-plasma-risk|${HOME}/.config/kxkbrc|home-config/.config/kxkbrc|${HOME}/.config/kxkbrc|Keyboard layout settings|snapshot"

  # GNOME dconf dump placeholder.
