  "dir|modules-load|safe|linux-system|/etc/modules-load.d|etc/modules-load.d|/etc/modules-load.d|Module autoload configuration|snapshot"
  "dir|etc-default|safe|linux-system|/etc/default|etc/default|/etc/default|Default service and tool settings|snapshot"

