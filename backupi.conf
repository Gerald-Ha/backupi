  "dnf-packages|fedora-dnf-userinstalled|safe|packages||package-lists/fedora-dnf-userinstalled.txt||Fedora DNF packages installed by the user|snapshot"
  "flatpak-apps|flatpak-apps|safe|packages||package-lists/flatpaks.txt||Flatpak application IDs|snapshot"

  # User shell and CLI config
  "file|bashrc|safe|user-shell|${HOME}/.bashrc|home-config/.bashrc|${HOME}/.bashrc|Bash shell configuration|snapshot"
  "file|bash-profile|safe|user-shell|${HOME}/.bash_profile|home-config/.bash_profile|${HOME}/.bash_profile|Bash login profile|snapshot"
  "file|profile|safe|user-shell|${HOME}/.profile|home-config/.profile|${HOME}/.profile|POSIX shell profile|snapshot"
  "file|zshrc|safe|user-shell|${HOME}/.zshrc|home-config/.zshrc|${HOME}/.zshrc|Zsh shell configuration|snapshot"
  "file|gitconfig|safe|user-cli|${HOME}/.gitconfig|home-config/.gitconfig|${HOME}/.gitconfig|Git user configuration|snapshot"
  "file|vimrc|safe|user-cli|${HOME}/.vimrc|home-config/.vimrc|${HOME}/.vimrc|Vim configuration|snapshot"
  "file|ssh-config|risky|user-secrets|${HOME}/.ssh/config|home-config/.ssh/config|${HOME}/.ssh/config|OpenSSH client config without private keys|snapshot"
  "file|gpg-agent-conf|risky|user-secrets|${HOME}/.gnupg/gpg-agent.conf|home-config/.gnupg/gpg-agent.conf|${HOME}/.gnupg/gpg-agent.conf|GnuPG agent configuration without key material|snapshot"

  # User desktop files
  "dir|desktop-launchers|safe|user-desktop|${HOME}/.local/share/applications|home-config/share/applications|${HOME}/.local/share/applications|Local desktop launchers|snapshot"
  "dir|icons|safe|user-desktop|${HOME}/.local/share/icons|home-config/share/icons|${HOME}/.local/share/icons|Local user icons|snapshot"
  "dir|wallpapers|safe|user-desktop|${HOME}/.local/share/wallpapers|home-config/share/wallpapers|${HOME}/.local/share/wallpapers|Local user wallpapers|snapshot"
  "dir|fonts|safe|user-desktop|${HOME}/.local/share/fonts|home-config/share/fonts|${HOME}/.local/share/fonts|Local user fonts|snapshot"

  # Common app config
  "dir|config-code|risky|app-config|${HOME}/.config/Code|home-config/.config/Code|${HOME}/.config/Code|Visual Studio Code config|snapshot"
  "dir|config-cursor|risky|app-config|${HOME}/.config/Cursor|home-config/.config/Cursor|${HOME}/.config/Cursor|Cursor editor config|snapshot"
  "dir|config-obs|risky|app-config|${HOME}/.config/obs-studio|home-config/.config/obs-studio|${HOME}/.config/obs-studio|OBS Studio config|snapshot"
  "dir|config-qbittorrent|risky|app-config|${HOME}/.config/qBittorrent|home-config/.config/qBittorrent|${HOME}/.config/qBittorrent|qBittorrent config|snapshot"
  "dir|config-filezilla|risky|app-config|${HOME}/.config/filezilla|home-config/.config/filezilla|${HOME}/.config/filezilla|FileZilla config|snapshot"
  "dir|config-joplin|risky|app-config|${HOME}/.config/joplin-desktop|home-config/.config/joplin-desktop|${HOME}/.config/joplin-desktop|Joplin desktop config|snapshot"
  "dir|config-kitty|risky|app-config|${HOME}/.config/kitty|home-config/.config/kitty|${HOME}/.config/kitty|Kitty terminal config|snapshot"
  "dir|config-alacritty|risky|app-config|${HOME}/.config/alacritty|home-config/.config/alacritty|${HOME}/.config/alacritty|Alacritty terminal config|snapshot"
  "dir|config-wezterm|risky|app-config|${HOME}/.config/wezterm|home-config/.config/wezterm|${HOME}/.config/wezterm|WezTerm terminal config|snapshot"
  "dir|config-htop|safe|app-config|${HOME}/.config/htop|home-config/.config/htop|${HOME}/.config/htop|htop config|snapshot"
  "dir|config-btop|safe|app-config|${HOME}/.config/btop|home-config/.config/btop|${HOME}/.config/btop|btop config|snapshot"

