  "file|gnome-dconf|risky|gnome|${HOME}/.config/backupi/gnome-dconf.ini|home-config/.config/backupi/gnome-dconf.ini|${HOME}/.config/backupi/gnome-dconf.ini|GNOME dconf dump file|snapshot"

