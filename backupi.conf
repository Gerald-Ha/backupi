  "file|dolphinrc|risky|kde-careful|${HOME}/.config/dolphinrc|home-config/.config/dolphinrc|${HOME}/.config/dolphinrc|Dolphin file manager settings|snapshot"
  "file|konsolerc|risky|kde-careful|${HOME}/.config/konsolerc|home-config/.config/konsolerc|${HOME}/.config/konsolerc|Konsole settings|snapshot"
